<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Superficial Games</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #1a1a1a, #333);
      color: white;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 {
      margin-top: 40px;
    }
    .game-button {
      display: block;
      margin: 40px auto;
      padding: 20px 40px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      background-color: #29bffd;
      color: black;
      cursor: pointer;
      width: 250px;
      transition: transform 0.2s, background 0.2s;
      text-decoration: none;
    }
    .game-button:hover {
      transform: scale(1.05);
      background-color: #1ea7cc;
    }
  </style>
</head>
<body>

  <h1>Superficial Games</h1>
  <p>Scroll down to pick a game!</p>

  <a class="game-button" href="https://www.coolmathgames.com/0-duck-life" target="_blank">Duck Life</a>
  <a class="game-button" href="https://www.coolmathgames.com/0-slice-master" target="_blank">Slice Master</a>
  <a class="game-button" href="https://www.coolmathgames.com/0-run" target="_blank">Run</a>
  <a class="game-button" href="https://www.coolmathgames.com/0-fireboy-and-water-girl-in-the-forest-temple" target="_blank">Fireboy & Watergirl</a>
  <a class="game-button" href="https://www.coolmathgames.com/0-papas-pizzeria" target="_blank">Papa's Pizzeria</a>

</body>
</html>
