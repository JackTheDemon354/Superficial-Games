<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Portal - Superficial Games</title>
  <link rel="stylesheet" href="/public/styles.css">
</head>
<body>
  <h1>Superficial Games - Staff Portal</h1>

  <section id="homepage-editor">
    <h2>Homepage Editor</h2>
    <textarea id="homepage-content" style="width: 100%; height: 300px;"></textarea><br>
    <button onclick="undoHomepage()" style="margin-top: 0.5em;">Undo Changes</button>
    <button onclick="saveHomepage()">Save Homepage</button>

    <div style="margin-top: 1em;">
      <label for="version-select">Load Previous Version:</label>
      <select id="version-select"></select>
      <button onclick="loadSelectedVersion()">Load Version</button>
    </div>
  </section>

  <footer style="margin-top: 2em; text-align: center; color: gray;">
    v2.5.1
  </footer>

  <script>
    async function loadHomepage() {
      const res = await fetch('/api/homepage');
      const data = await res.json();
      document.getElementById('homepage-content').value = data.html || '';
    }

    async function saveHomepage() {
      const html = document.getElementById('homepage-content').value;
      const confirmSave = confirm("Are you sure you want to overwrite the homepage?");
      if (!confirmSave) return;

      const res = await fetch('/api/homepage', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ html })
      });

      if (res.ok) {
        alert('Homepage saved!');
        loadVersions();
      } else {
        alert('Save failed.');
      }
    }

    async function undoHomepage() {
      const res = await fetch('/api/homepage');
      const data = await res.json();
      document.getElementById('homepage-content').value = data.html || '';
    }

    async function loadVersions() {
      const res = await fetch('/api/homepage/versions');
      const data = await res.json();
      const select = document.getElementById('version-select');
      select.innerHTML = '';
      data.versions.forEach(filename => {
        const option = document.createElement('option');
        option.value = filename;
        option.textContent = filename;
        select.appendChild(option);
      });
    }

    async function loadSelectedVersion() {
      const filename = document.getElementById('version-select').value;
      if (!filename) return;

      const res = await fetch(`/api/homepage/version/${filename}`);
      const data = await res.json();
      document.getElementById('homepage-content').value = data.html || '';
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadHomepage();
      loadVersions();
    });
  </script>
</body>
</html>
