<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Our Team - Superficial Games</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    body {
      font-family: Calibri, sans-serif;
      margin: 0;
      background: #f0f0f0;
    }

    .block {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .team-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .team-card {
      position: relative;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 15px;
      width: 250px;
      background: #fff;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      text-align: center;
      transition: transform 0.2s ease;
      overflow: hidden;
    }

    .team-card:hover {
      transform: translateY(-5px);
    }

    .team-card img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    .tags {
      margin-top: 10px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease;
    }

    .team-card:hover .tags {
      opacity: 1;
      transform: translateY(0);
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 5px;
      font-size: 0.85em;
      color: white;
      margin: 2px 4px;
      font-family: Calibri, sans-serif;
    }

    .tag-red {
      background: #e74c3c;
    }

    .tag-orange {
      background: #e67e22;
    }

    .tag-yellow {
      background: #f1c40f;
      color: #222;
    }

    .tag-green {
      background: limegreen;
    }

    .version {
      text-align: center;
      margin-top: 40px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="block">
    <h2>👥 Meet the Team</h2>
    <div id="team" class="team-grid"></div>
  </div>

  <div class="version">v2.5.1</div>

  <script>
    async function loadTeam() {
      try {
        const res = await fetch('/data/Staff.json');
        const staff = await res.json();

        const container = document.getElementById('team');
        staff.forEach(member => {
          const card = document.createElement('div');
          card.className = 'team-card';

          // Create tag elements
          let tagHtml = '';
          if (member.tags && Array.isArray(member.tags)) {
            const colorClass = getTagColorClass(member.name);
            tagHtml = `<div class="tags">` +
              member.tags.map(tag => `<span class="tag ${colorClass}">#${tag}</span>`).join(' <b>-</b> ') +
              `</div>`;
          }

          card.innerHTML = `
            <img src="/uploads/${member.image}" alt="${member.name}">
            <h3>${member.name}</h3>
            <p><strong>${member.role}</strong></p>
            ${member.review ? `<p>💬 "${member.review}"</p>` : ''}
            ${tagHtml}
          `;

          container.appendChild(card);
        });
      } catch (err) {
        document.getElementById('team').innerText = 'Failed to load team data.';
        console.error(err);
      }
    }

    function getTagColorClass(name) {
      if (name.includes("Jack")) return "tag-red";
      if (name.includes("Chloe")) return "tag-orange";
      if (name.includes("Neve")) return "tag-yellow";
      if (name.includes("Isabelle")) return "tag-green";
      return "";
    }

    loadTeam();
  </script>
</body>
</html>
