<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Team & Reviews - Superficial Games</title>
  <style>
    body {
      font-family: Calibri, Comic Sans MS;
      margin: 0;
      background: #f0f0f0;
    }

    .block {
      max-width: 1300px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    /* TEAM CARDS */
    .team-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px 0;
    }

    .team-card {
      position: relative;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      width: 250px;
      background: #fff;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
      text-align: center;
      transition: transform 0.2s ease;
      overflow: hidden;
      font-size: 14px;
    }

    .team-card:hover {
      transform: translateY(-5px);
    }

    .team-card img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    .tags {
      margin-top: 8px;
      opacity: 0;
      transform: translateY(15px);
      transition: all 0.4s ease;
      font-weight: bold;
    }

    .team-card:hover .tags {
      opacity: 1;
      transform: translateY(0);
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 5px;
      font-size: 0.8em;
      color: white;
      margin: 2px 4px;
    }

    .tag-red { background: #e74c3c; }
    .tag-orange { background: #e67e22; }
    .tag-yellow { background: #f1c40f; color: #222; }
    .tag-green { background: limegreen; }
    .tag-blue { background: #0000FF; }
    .tag-pink { background: #DB0167; }
    .tag-purple { background: #800080; }
    .tag-brown { background: #A52A2A; }


    /* REVIEWS ROW */
    .reviews-row {
      margin-top: 40px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .review-card {
      width: 300px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
      padding: 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
      font-size: 14px;
      transition: transform 0.3s ease;
    }

    .review-card:hover {
      transform: translateY(-5px);
    }

    .stars {
      margin-bottom: 10px;
      opacity: 0;
      transform: translateY(15px);
      transition: all 0.4s ease;
      display: inline-block;
    }

    .review-card:hover .stars {
      opacity: 1;
      transform: translateY(0);
    }

    /* Star SVG styling */
    .stars svg {
      width: 28px;
      height: 28px;
      vertical-align: middle;
      margin: 0 2px;
    }

    /* Version footer */
    .version {
      text-align: center;
      margin-top: 50px;
      color: #888;
      font-size: 13px;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="block">
    <h2>👥 Meet the Team</h2>
    <div id="team" class="team-grid"></div>

    <h2>🌟 Reviews from Our Fans</h2>
    <div id="reviews" class="reviews-row"></div>
  </div>

  <div class="version">v2.5.6</div>

  <script>
    // Load Staff.json from your server
    async function loadTeam() {
      try {
        const res = await fetch('/data/Staff.json');
        const staff = await res.json();

        const container = document.getElementById('team');
        staff.forEach(member => {
          const card = document.createElement('div');
          card.className = 'team-card';

          let tagHtml = '';
          if (member.tags && Array.isArray(member.tags)) {
            const colorClass = getTagColorClass(member.name);
            tagHtml = `<div class="tags">` +
              member.tags.map(tag => `<span class="tag ${colorClass}">#${tag}</span>`).join(' <b>-</b> ') +
              `</div>`;
          }

          card.innerHTML = `
            <img src="/uploads/${member.image}" alt="${member.name}">
            <h3>${member.name}</h3>
            <p><strong>${member.role}</strong></p>
            ${member.review ? `<p>💬 "${member.review}"</p>` : ''}
            ${tagHtml}
          `;

          container.appendChild(card);
        });
      } catch (err) {
        document.getElementById('team').innerText = 'Failed to load team data.';
        console.error(err);
      }
    }

    // Determine tag color class by name
    function getTagColorClass(name) {
      if (name.includes("Jack")) return "tag-red";
      if (name.includes("Chloe")) return "tag-orange";
      if (name.includes("Neve")) return "tag-yellow";
      if (name.includes("Isabelle")) return "tag-green";
      if (name.includes("Cool Math Games")) return "tag-blue";
      if (name.includes("Poki")) return "tag-pink";
      if (name.includes("Two Player Games.org")) return "tag-purple";
      if (name.includes("Crazy Games")) return "tag-brown"
      return "tag-red"; // fallback
    }

    // SVG templates for stars
    const starFullSVG = `<svg aria-hidden="true" viewBox="0 0 24 24" fill="#FD9500" xmlns="http://www.w3.org/2000/svg"><path d="M11.99 6.127l2.641 5.388 6.097.871-5.47 5.172 1.284 6.062-5.646-3.021-5.646 3.021 1.284-6.062-5.47-5.172 6.097-.871 2.64-5.388z"/></svg>`;
    const starEmptySVG = `<svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2" xmlns="http://www.w3.org/2000/svg"><path d="M11.99 6.127l2.641 5.388 6.097.871-5.47 5.172 1.284 6.062-5.646-3.021-5.646 3.021 1.284-6.062-5.47-5.172 6.097-.871 2.64-5.388z"/></svg>`;
    function starHalfSVG(id) {
      return `
        <svg aria-hidden="true" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
          <defs>
            <linearGradient id="${id}">
              <stop offset="50%" stop-color="#FD9500"/>
              <stop offset="50%" stop-color="transparent"/>
            </linearGradient>
          </defs>
          <path fill="url(#${id})" stroke="#FD9500" stroke-width="2" d="M11.99 6.127l2.641 5.388 6.097.871-5.47 5.172 1.284 6.062-5.646-3.021-5.646 3.021 1.284-6.062-5.47-5.172 6.097-.871 2.64-5.388z"/>
        </svg>
      `;
    }

    // Render stars into container for any rating 0 to 5 with 0.5 steps
    function renderStars(rating, container) {
      container.innerHTML = "";
      const fullStars = Math.floor(rating);
      const halfStar = rating % 1 >= 0.5;
      const emptyStars = 5 - fullStars - (halfStar ? 1 : 0);

      for (let i = 0; i < fullStars; i++) {
        container.insertAdjacentHTML('beforeend', starFullSVG);
      }
      if (halfStar) {
        const gradientId = 'grad' + Math.random().toString(36).slice(2, 7);
        container.insertAdjacentHTML('beforeend', starHalfSVG(gradientId));
      }
      for (let i = 0; i < emptyStars; i++) {
        container.insertAdjacentHTML('beforeend', starEmptySVG);
      }
    }

    // Load reviews from Reviews.json
    async function loadReviews() {
      try {
        const res = await fetch('/data/Reviews.json');
        const reviewsData = await res.json();

        const container = document.getElementById('reviews');
        reviewsData.forEach((review) => {
          const card = document.createElement('div');
          card.className = 'review-card';

          const starsContainer = document.createElement('div');
          starsContainer.className = 'stars';
          renderStars(review.stars, starsContainer);

          card.innerHTML = `
            <h3>${review.name}</h3>
            <p>"${review.text}"</p>
          `;
          card.prepend(starsContainer);
          container.appendChild(card);
        });
      } catch (err) {
        const container = document.getElementById('reviews');
        container.innerText = 'Failed to load reviews.';
        console.error(err);
      }
    }

    // Run loads
    loadTeam();
    loadReviews();
  </script>
</body>
</html>
