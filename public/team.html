<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Our Team - Superficial Games</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    body {
      font-family: Calibri, sans-serif;
      margin: 0;
      background: #f0f0f0;
    }

    .block {
      max-width: 1300px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    /* Team Cards */
    .team-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px 0;
    }

    .team-card {
      position: relative;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      width: 250px;
      background: #fff;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
      text-align: center;
      transition: transform 0.2s ease;
      overflow: hidden;
    }

    .team-card:hover {
      transform: translateY(-5px);
    }

    .team-card img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    .tags {
      margin-top: 8px;
      opacity: 0;
      transform: translateY(15px);
      transition: all 0.4s ease;
      font-size: 0.9em;
    }

    .team-card:hover .tags {
      opacity: 1;
      transform: translateY(0);
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 5px;
      font-size: 0.8em;
      color: white;
      margin: 2px 4px;
    }

    .tag-red { background: #e74c3c; }
    .tag-orange { background: #e67e22; }
    .tag-yellow { background: #f1c40f; color: #222; }
    .tag-green { background: limegreen; }

    /* Reviews Section */
    .reviews-section {
      max-width: 1300px;
      margin: 40px auto 20px;
      padding: 0 20px;
    }

    .reviews-section h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .reviews-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .review-card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.12);
      width: 300px;
      padding: 20px;
      font-size: 0.95em;
      color: #222;
      position: relative;
      user-select: none;
      transition: transform 0.2s ease;
    }

    .review-card:hover {
      transform: translateY(-5px);
    }

    /* Animate stars container on hover */
    .review-card:hover .review-stars {
      opacity: 1;
      transform: translateY(0);
    }

    .review-stars {
      margin-bottom: 10px;
      opacity: 0;
      transform: translateY(15px);
      transition: all 0.4s ease;
      display: inline-flex;
      gap: 3px;
      justify-content: center;
    }

    .review-stars svg {
      width: 24px;
      height: 24px;
      fill: #fd9500; /* Gold */
      flex-shrink: 0;
    }

    /* Empty star greyed out */
    .star-empty {
      fill: #ccc;
    }

    .review-text {
      font-style: italic;
      margin-bottom: 12px;
      min-height: 60px;
      text-align: center;
    }

    .review-author {
      font-weight: bold;
      text-align: right;
      color: #555;
    }

    .version {
      text-align: center;
      margin: 40px 0;
      color: #888;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="block">
    <h2>👥 Meet the Team</h2>
    <div id="team" class="team-grid"></div>
  </div>

  <div class="reviews-section">
    <h2>🌟 Reviews from Our Fans</h2>
    <div id="reviews" class="reviews-grid"></div>
  </div>

  <div class="version">v2.5.5</div>

  <script>
    async function loadTeam() {
      try {
        const res = await fetch('/data/Staff.json');
        const staff = await res.json();

        const container = document.getElementById('team');
        staff.forEach(member => {
          const card = document.createElement('div');
          card.className = 'team-card';

          let tagHtml = '';
          if (member.tags && Array.isArray(member.tags)) {
            const colorClass = getTagColorClass(member.name);
            tagHtml = `<div class="tags">` +
              member.tags.map(tag => `<span class="tag ${colorClass}">#${tag}</span>`).join(' <b>-</b> ') +
              `</div>`;
          }

          card.innerHTML = `
            <img src="/uploads/${member.image}" alt="${member.name}">
            <h3>${member.name}</h3>
            <p><strong>${member.role}</strong></p>
            ${member.review ? `<p>💬 "${member.review}"</p>` : ''}
            ${tagHtml}
          `;

          container.appendChild(card);
        });
      } catch (err) {
        document.getElementById('team').innerText = 'Failed to load team data.';
        console.error(err);
      }
    }

    function getTagColorClass(name) {
      if (name.includes("Jack")) return "tag-red";
      if (name.includes("Chloe")) return "tag-orange";
      if (name.includes("Neve")) return "tag-yellow";
      if (name.includes("Isabelle")) return "tag-green";
      return "";
    }

    // SVG icons for stars
    const starFullSVG = `
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M11.99 6.12l2.64 5.39 6.1.87-5.47 5.17 1.28 6.06-5.65-3.02-5.64 3.02 1.28-6.06-5.47-5.17 6.1-.87z"/>
      </svg>
    `;
    const starHalfSVG = `
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <defs>
          <linearGradient id="half-grad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="50%" stop-color="#fd9500"/>
            <stop offset="50%" stop-color="#ccc"/>
          </linearGradient>
        </defs>
        <path fill="url(#half-grad)" d="M11.99 6.12l2.64 5.39 6.1.87-5.47 5.17 1.28 6.06-5.65-3.02-5.64 3.02 1.28-6.06-5.47-5.17 6.1-.87z"/>
      </svg>
    `;
    const starEmptySVG = `
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false" class="star-empty">
        <path d="M11.99 6.12l2.64 5.39 6.1.87-5.47 5.17 1.28 6.06-5.65-3.02-5.64 3.02 1.28-6.06-5.47-5.17 6.1-.87z"/>
      </svg>
    `;

    // Example random reviews data
    const reviewsData = [
      {author: "Alice W.", rating: 5, text: "Amazing experience! Highly recommend."},
      {author: "Bob K.", rating: 4.5, text: "Really fun games and great community."},
      {author: "Carol D.", rating: 4, text: "Enjoyed my time here, friendly staff."},
      {author: "David L.", rating: 5, text: "Best gaming platform I've used!"},
      {author: "Eve M.", rating: 3.5, text: "Good but could improve some features."},
      {author: "Frank P.", rating: 4, text: "Nice environment and well organized."},
      {author: "Grace S.", rating: 5, text: "Exceptional service and quality."}
    ];

    // Generate stars HTML for given rating (e.g., 4.5)
    function generateStars(rating) {
      let html = '';
      const fullStars = Math.floor(rating);
      const halfStar = rating % 1 >= 0.5;
      for (let i = 0; i < fullStars; i++) {
        html += starFullSVG;
      }
      if (halfStar) {
        html += starHalfSVG;
      }
      const emptyStars = 5 - fullStars - (halfStar ? 1 : 0);
      for (let i = 0; i < emptyStars; i++) {
        html += starEmptySVG;
      }
      return html;
    }

    // Load reviews into the review section
    function loadReviews() {
      const container = document.getElementById('reviews');
      reviewsData.forEach(review => {
        const card = document.createElement('div');
        card.className = 'review-card';

        card.innerHTML = `
          <div class="review-stars">${generateStars(review.rating)}</div>
          <div class="review-text">"${review.text}"</div>
          <div class="review-author">- ${review.author}</div>
        `;

        container.appendChild(card);
      });
    }

    loadTeam();
    loadReviews();
  </script>
</body>
</html>
