<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Our Team - Superficial Games</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    body {
      font-family: Calibri, sans-serif;
      margin: 0;
      background: #f0f0f0;
    }

    .block {
      max-width: 1300px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .team-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .team-card {
      position: relative;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      width: 250px;
      background: #fff;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
      text-align: center;
      transition: transform 0.2s ease;
      overflow: hidden;
    }

    .team-card:hover {
      transform: translateY(-5px);
    }

    .team-card img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    .tags {
      margin-top: 8px;
      opacity: 0;
      transform: translateY(15px);
      transition: all 0.4s ease;
    }

    .team-card:hover .tags {
      opacity: 1;
      transform: translateY(0);
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 5px;
      font-size: 0.8em;
      color: white;
      margin: 2px 4px;
    }

    .tag-red { background: #e74c3c; }
    .tag-orange { background: #e67e22; }
    .tag-yellow { background: #f1c40f; color: #222; }
    .tag-green { background: limegreen; }

    .reviews-row {
      text-align: center;
      margin-top: 30px;
      font-size: 1.2em;
      font-weight: bold;
      color: #333;
      user-select: none;
    }

    .stars-img {
      margin-bottom: 6px;
    }

    /* Star images styling */
    .stars-img img {
      width: 28px;
      height: 28px;
      margin: 0 2px;
      vertical-align: middle;
    }

    .version {
      text-align: center;
      margin-top: 40px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="block">
    <h2>👥 Meet the Team</h2>
    <div id="team" class="team-grid"></div>

    <div class="reviews-row" id="review-container">
      <div class="stars-img" id="stars-container"></div>
      <div id="review-text"></div>
    </div>
  </div>

  <div class="version">v2.5.4</div>

  <script>
    async function loadTeam() {
      try {
        const res = await fetch('/data/Staff.json');
        const staff = await res.json();

        const container = document.getElementById('team');
        staff.forEach(member => {
          const card = document.createElement('div');
          card.className = 'team-card';

          let tagHtml = '';
          if (member.tags && Array.isArray(member.tags)) {
            const colorClass = getTagColorClass(member.name);
            tagHtml = `<div class="tags">` +
              member.tags.map(tag => `<span class="tag ${colorClass}">#${tag}</span>`).join(' <b>-</b> ') +
              `</div>`;
          }

          card.innerHTML = `
            <img src="/uploads/${member.image}" alt="${member.name}">
            <h3>${member.name}</h3>
            <p><strong>${member.role}</strong></p>
            ${member.review ? `<p>💬 "${member.review}"</p>` : ''}
            ${tagHtml}
          `;

          container.appendChild(card);
        });
      } catch (err) {
        document.getElementById('team').innerText = 'Failed to load team data.';
        console.error(err);
      }
    }

    function getTagColorClass(name) {
      if (name.includes("Jack")) return "tag-red";
      if (name.includes("Chloe")) return "tag-orange";
      if (name.includes("Neve")) return "tag-yellow";
      if (name.includes("Isabelle")) return "tag-green";
      return "";
    }

    // Star image base64 data URI (a simple gold star)
    const starImgSrc = "data:image/svg+xml;base64,PHN2ZyBmaWxsPSIjRkQ5NTAwIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCI+PHBhdGggZD0iTTExLjk5IDYuMTI3bDIuNjQxIDUuMzg4IDYuMDk3Ljg3MS01LjQ3IDUuMTcyIDEuMjg0IDYuMDYyLTUuNjQ3LTMuMDIxLTUuNjQ3IDMuMDIxIDEuMjg0LTYuMDYyLTUuNDctNS4xNzIgNi4wOTctLjg3MSAyLjY0MS01LjM4OHoiLz48L3N2Zz4=";

    // Array of good review phrases
    const goodReviews = [
      "Superficial Games is amazing!",
      "Best gaming experience ever.",
      "I love working here every day.",
      "Creative, fun, and inspiring.",
      "Our team rocks!",
      "Gaming excellence at its finest.",
      "A truly awesome place to be.",
      "Innovating games with passion.",
      "Where creativity meets fun!",
      "Superficial Games is good"
    ];

    // Show random review + stars
    function showRandomReview() {
      const reviewTextEl = document.getElementById("review-text");
      const starsContainer = document.getElementById("stars-container");

      // Pick random review phrase
      const phrase = goodReviews[Math.floor(Math.random() * goodReviews.length)];
      reviewTextEl.textContent = `"${phrase}"`;

      // Show 5 star images
      starsContainer.innerHTML = "";
      for (let i = 0; i < 5; i++) {
        const img = document.createElement("img");
        img.src = starImgSrc;
        img.alt = "star";
        starsContainer.appendChild(img);
      }
    }

    loadTeam();
    showRandomReview();
  </script>
</body>
</html>
